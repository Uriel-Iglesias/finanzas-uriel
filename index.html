<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanzas">
<title>Finanzas</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f2f2f7;
  --card: #fff;
  --green: #34c759;
  --red: #ff3b30;
  --blue: #007aff;
  --ink: #000;
  --ink2: #8e8e93;
  --sep: #e5e5ea;
  --top: env(safe-area-inset-top, 44px);
  --bot: env(safe-area-inset-bottom, 0px);
}
html { background: var(--bg); }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); background: var(--bg); min-height: 100dvh; padding-bottom: calc(80px + var(--bot)); -webkit-tap-highlight-color: transparent; }

/* ─ HEADER ─ */
.hdr { padding: calc(var(--top) + 12px) 20px 14px; background: var(--bg); }
.hdr-title { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
.hdr-date  { font-size: 14px; color: var(--ink2); margin-top: 2px; }

/* ─ BALANCE CARD ─ */
.bal-card { margin: 0 16px; background: #1c1c1e; border-radius: 22px; padding: 22px 22px 18px; color: #fff; }
.bal-lbl  { font-size: 12px; font-weight: 600; opacity: .45; letter-spacing: 1px; text-transform: uppercase; }
.bal-num  { font-size: 48px; font-weight: 800; letter-spacing: -2px; line-height: 1.05; margin: 4px 0 18px; }
.bal-num.pos { color: #32d74b; }
.bal-num.neg { color: #ff453a; }
.bal-row  { display: flex; gap: 10px; }
.bal-pill { flex: 1; background: rgba(255,255,255,.1); border-radius: 12px; padding: 11px 14px; }
.bp-lbl   { font-size: 11px; opacity: .5; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.bp-val   { font-size: 19px; font-weight: 700; margin-top: 2px; }
.bp-val.g { color: #32d74b; }
.bp-val.r { color: #ff453a; }

/* ─ MONTH ROW ─ */
.mo-row { display: flex; gap: 12px; margin: 12px 16px 0; }
.mo-card { flex: 1; background: var(--card); border-radius: 16px; padding: 14px 16px; }
.mo-lbl { font-size: 11px; color: var(--ink2); font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
.mo-val { font-size: 22px; font-weight: 700; letter-spacing: -.5px; margin-top: 3px; }
.mo-val.g { color: var(--green); }
.mo-val.r { color: var(--red); }
.mo-sub { font-size: 11px; color: var(--ink2); margin-top: 1px; }

/* ─ FILTER ─ */
.filt { display: flex; gap: 8px; padding: 14px 16px 0; overflow-x: auto; scrollbar-width: none; }
.filt::-webkit-scrollbar { display: none; }
.fc { flex-shrink: 0; padding: 7px 15px; border-radius: 20px; border: none; background: var(--card); color: var(--ink2); font-size: 14px; font-weight: 600; cursor: pointer; }
.fc.on { background: var(--ink); color: #fff; }

/* ─ TX LIST ─ */
.sec { padding: 14px 16px 0; }
.day-hdr { font-size: 13px; font-weight: 600; color: var(--ink2); padding: 10px 4px 5px; display: flex; justify-content: space-between; }
.tx { background: var(--card); border-radius: 14px; padding: 13px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 2px; cursor: pointer; min-height: 64px; }
.tx:active { opacity: .6; }
.tx-ico { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.tx-ico.i { background: rgba(52,199,89,.13); }
.tx-ico.e { background: rgba(255,59,48,.1); }
.tx-info { flex: 1; min-width: 0; }
.tx-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-sub  { font-size: 12px; color: var(--ink2); margin-top: 1px; }
.tx-amt  { font-size: 16px; font-weight: 700; flex-shrink: 0; }
.tx-amt.i { color: var(--green); }
.tx-amt.e { color: var(--red); }

.empty { text-align: center; padding: 56px 0; color: var(--ink2); }
.empty em { font-size: 42px; display: block; margin-bottom: 8px; }

/* ─ BOTTOM BAR ─ */
.bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 10px; padding: 10px 16px calc(10px + var(--bot)); background: rgba(242,242,247,.93); border-top: .5px solid var(--sep); z-index: 90; }
.bar-btn { flex: 1; height: 54px; border-radius: 14px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; }
.bar-btn:active { opacity: .7; transform: scale(.97); }
.bar-btn.i { background: var(--green); color: #fff; }
.bar-btn.e { background: var(--red); color: #fff; }

/* ─ SHEET ─ */
.dim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; align-items: flex-end; }
.dim.on { display: flex; }

.sheet {
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  width: 100%;
  max-height: 88dvh;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(16px + var(--bot));
  transform: translate3d(0,0,0);
}

.knob { width: 36px; height: 4px; background: #c7c7cc; border-radius: 2px; margin: 10px auto 0; }

/* ─ AMOUNT DISPLAY ─ */
.amt-wrap { display: flex; align-items: center; justify-content: center; padding: 12px 20px 8px; gap: 6px; }
.amt-euro { font-size: 36px; font-weight: 800; color: var(--ink2); }
.amt-num  { font-size: 60px; font-weight: 800; letter-spacing: -2px; outline: none; border: none; background: transparent; color: var(--ink); width: 100%; text-align: left; -webkit-appearance: none; }
.amt-num::-webkit-inner-spin-button,
.amt-num::-webkit-outer-spin-button { display: none; }

/* ─ CAT GRID ─ */
.cat-lbl { font-size: 13px; font-weight: 700; color: var(--ink2); text-transform: uppercase; letter-spacing: .5px; padding: 4px 16px 8px; }
.cats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 0 16px; }
.cat { background: var(--card); border-radius: 14px; padding: 12px 6px 10px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: border-color .15s; }
.cat:active { opacity: .65; }
.cat.on { border-color: var(--blue); background: rgba(0,122,255,.06); }
.cat em { font-size: 26px; display: block; margin-bottom: 4px; font-style: normal; }
.cat span { font-size: 11px; font-weight: 600; line-height: 1.25; display: block; }
.cat b { font-size: 12px; font-weight: 800; color: var(--blue); display: block; margin-top: 2px; }

/* ─ EXTRA FIELDS ─ */
.extra { background: var(--card); border-radius: 14px; margin: 10px 16px 0; overflow: hidden; }
.ex-row { display: flex; align-items: center; padding: 13px 16px; border-bottom: .5px solid var(--sep); }
.ex-row:last-child { border: none; }
.ex-lbl { font-size: 15px; flex: 1; }
.ex-row input { border: none; background: transparent; font-size: 15px; font-family: inherit; text-align: right; color: var(--ink); outline: none; max-width: 55%; -webkit-appearance: none; }
.ex-row input::placeholder { color: var(--ink2); }

/* ─ SAVE BTN ─ */
.save { margin: 12px 16px 0; width: calc(100% - 32px); height: 56px; border-radius: 14px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; }
.save:active { opacity: .7; transform: scale(.98); }
.save.i { background: var(--green); color: #fff; }
.save.e { background: var(--red); color: #fff; }

/* ─ DETAIL SHEET ─ */
.det-sheet { background: var(--bg); border-radius: 22px 22px 0 0; width: 100%; padding-bottom: calc(16px + var(--bot)); transform: translate3d(0,0,0); }
.det-center { text-align: center; padding: 20px 20px 14px; }
.det-ico { width: 68px; height: 68px; border-radius: 17px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 10px; }
.det-ico.i { background: rgba(52,199,89,.13); }
.det-ico.e { background: rgba(255,59,48,.1); }
.det-amt { font-size: 38px; font-weight: 800; letter-spacing: -1.5px; }
.det-amt.i { color: var(--green); }
.det-amt.e { color: var(--red); }
.det-desc { font-size: 16px; font-weight: 600; margin-top: 4px; color: var(--ink2); }
.det-rows { background: var(--card); border-radius: 14px; margin: 0 16px 10px; overflow: hidden; }
.det-row { display: flex; justify-content: space-between; padding: 13px 16px; border-bottom: .5px solid var(--sep); font-size: 15px; }
.det-row:last-child { border: none; }
.det-key { color: var(--ink2); }
.det-val { font-weight: 600; }
.del-btn { margin: 0 16px; width: calc(100% - 32px); height: 52px; border-radius: 14px; border: none; background: rgba(255,59,48,.1); color: var(--red); font-size: 16px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">💰 Finanzas</div>
  <div class="hdr-date" id="hDate"></div>
</div>

<div class="bal-card">
  <div class="bal-lbl">Balance actual</div>
  <div class="bal-num" id="balNum">€0</div>
  <div class="bal-row">
    <div class="bal-pill"><div class="bp-lbl">↑ Ingresos</div><div class="bp-val g" id="totI">€0</div></div>
    <div class="bal-pill"><div class="bp-lbl">↓ Gastos</div><div class="bp-val r" id="totE">€0</div></div>
  </div>
</div>

<div class="mo-row">
  <div class="mo-card"><div class="mo-lbl">Este mes</div><div class="mo-val g" id="mI">€0</div><div class="mo-sub">ingresos</div></div>
  <div class="mo-card"><div class="mo-lbl">Este mes</div><div class="mo-val r" id="mE">€0</div><div class="mo-sub">gastos</div></div>
</div>

<div class="filt">
  <button class="fc on" id="fc-all"    onclick="filt('all')">Todos</button>
  <button class="fc"    id="fc-income" onclick="filt('income')">↑ Ingresos</button>
  <button class="fc"    id="fc-expense"onclick="filt('expense')">↓ Gastos</button>
</div>

<div class="sec" id="txList"></div>

<div class="bar">
  <button class="bar-btn i" onclick="open_('income')">＋ Ingreso</button>
  <button class="bar-btn e" onclick="open_('expense')">＋ Gasto</button>
</div>

<!-- ADD SHEET -->
<div class="dim" id="addDim" onclick="dimClose(event,'addDim')">
  <div class="sheet">
    <div class="knob"></div>

    <div class="amt-wrap">
      <div class="amt-euro">€</div>
      <input class="amt-num" type="number" id="iAmt" placeholder="0" min="0" step="0.01" inputmode="decimal">
    </div>

    <div class="cat-lbl" id="catLbl">ELIGE CATEGORÍA</div>
    <div class="cats" id="catGrid"></div>

    <div class="extra">
      <div class="ex-row">
        <span class="ex-lbl">Nota (opcional)</span>
        <input type="text" id="iNote" placeholder="Añadir nota">
      </div>
      <div class="ex-row">
        <span class="ex-lbl">Fecha</span>
        <input type="date" id="iDate">
      </div>
    </div>

    <button class="save i" id="saveBtn" onclick="doSave()">Guardar</button>
  </div>
</div>

<!-- DETAIL SHEET -->
<div class="dim" id="detDim" onclick="dimClose(event,'detDim')">
  <div class="det-sheet">
    <div class="knob"></div>
    <div class="det-center">
      <div class="det-ico" id="dIco"></div>
      <div class="det-amt" id="dAmt"></div>
      <div class="det-desc" id="dDesc"></div>
    </div>
    <div class="det-rows">
      <div class="det-row"><span class="det-key">Categoría</span><span class="det-val" id="dCat"></span></div>
      <div class="det-row"><span class="det-key">Fecha</span><span class="det-val" id="dDate"></span></div>
      <div class="det-row"><span class="det-key">Tipo</span><span class="det-val" id="dType"></span></div>
    </div>
    <button class="del-btn" onclick="doDelete()">Eliminar</button>
  </div>
</div>

<script>
const KEY = 'fin-v4';
const MON = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const WD  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

/* ── CATEGORIES ─────────────────────────────────────────────────────────── */
// preset: precio fijo que se auto-rellena al tocar
const CI = [
  {v:'s1',  e:'📊', n:'Stand\nGoogle ×1', preset:30},
  {v:'s2',  e:'📊', n:'Stand\nGoogle ×2', preset:50},
  {v:'s3',  e:'📊', n:'Stand\nGoogle ×3', preset:60},
  {v:'lg',  e:'🔑', n:'Llavero\nGold'},
  {v:'ld',  e:'💎', n:'Llavero\nDiamond'},
  {v:'pa',  e:'👨', n:'Papá'},
  {v:'ma',  e:'👩', n:'Mamá'},
  {v:'sal', e:'💼', n:'Salario'},
  {v:'vta', e:'🏷️', n:'Venta'},
  {v:'reg', e:'🎁', n:'Regalo'},
  {v:'oi',  e:'💰', n:'Otros'},
];
const CE = [
  {v:'bus', e:'🚌', n:'Bus',      preset:2},
  {v:'com', e:'🍕', n:'Comida'},
  {v:'caf', e:'☕', n:'Café'},
  {v:'sup', e:'🛒', n:'Supermercado'},
  {v:'snk', e:'🍪', n:'Snack'},
  {v:'beb', e:'🥤', n:'Bebidas'},
  {v:'tax', e:'🚕', n:'Taxi /\nUber'},
  {v:'trn', e:'🚇', n:'Transporte'},
  {v:'gas', e:'⛽', n:'Gasolina'},
  {v:'rpa', e:'👕', n:'Ropa'},
  {v:'dep', e:'⚽', n:'Deportes'},
  {v:'oci', e:'🎬', n:'Ocio'},
  {v:'vje', e:'✈️', n:'Viajes'},
  {v:'med', e:'💊', n:'Médico /\nFarmacia'},
  {v:'gym', e:'🏋️', n:'Gimnasio'},
  {v:'est', e:'📚', n:'Estudios'},
  {v:'cas', e:'🏠', n:'Casa /\nAlquiler'},
  {v:'fac', e:'💡', n:'Facturas'},
  {v:'mat', e:'🧵', n:'Material'},
  {v:'sub', e:'🔄', n:'Suscripción'},
  {v:'env', e:'📦', n:'Envíos'},
  {v:'reg2',e:'🎁', n:'Regalos'},
  {v:'bel', e:'💅', n:'Belleza'},
  {v:'mas', e:'🐾', n:'Mascotas'},
  {v:'oe',  e:'💸', n:'Otros'},
];

/* ── STATE ──────────────────────────────────────────────────────────────── */
let txs = (() => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } })();
let curType = 'income';
let selCat  = null;
let curFilt = 'all';
let detId   = null;

const SEED = [
  {id:1001,type:'expense',amount:20, description:'Supermercado',  category:'sup', date:'2026-06-07'},
  {id:1002,type:'expense',amount:10, description:'Supermercado Vente', category:'sup', date:'2026-06-07'},
  {id:1003,type:'expense',amount:4,  description:'Bus',           category:'bus', date:'2026-06-06'},
  {id:1004,type:'expense',amount:10, description:'Comida',        category:'com', date:'2026-06-08'},
  {id:1005,type:'expense',amount:10, description:'Comida',        category:'com', date:'2026-06-09'},
  {id:1006,type:'income', amount:30, description:'Peluquería',    category:'s1',  date:'2026-06-07'},
  {id:1007,type:'income', amount:60, description:'Peluquería',    category:'s3',  date:'2026-06-07'},
  {id:1008,type:'income', amount:30, description:'Tienda mascotas',category:'s1', date:'2026-06-07'},
  {id:1009,type:'income', amount:50, description:'Pastelería',    category:'s2',  date:'2026-06-07'},
];
if (!txs.length) { txs = SEED; persist(); }

/* ── UTILS ──────────────────────────────────────────────────────────────── */
function persist() { localStorage.setItem(KEY, JSON.stringify(txs)); }
function €(n) { return '€'+n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function €s(n){ return '€'+n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtD(s){ const d=new Date(s+'T12:00:00'); return WD[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()]; }
function catOf(type,v){ return (type==='income'?CI:CE).find(c=>c.v===v) || {e:'💸',n:'Otros'}; }

/* ── STATS ──────────────────────────────────────────────────────────────── */
function stats(){
  const i=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const e=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const b=i-e;
  const el=document.getElementById('balNum');
  el.textContent=€(b); el.className='bal-num '+(b>0?'pos':b<0?'neg':'');
  document.getElementById('totI').textContent=€s(i);
  document.getElementById('totE').textContent=€s(e);
  const now=new Date(), ms=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('mI').textContent=€(txs.filter(t=>t.type==='income'&&t.date.startsWith(ms)).reduce((s,t)=>s+t.amount,0));
  document.getElementById('mE').textContent=€(txs.filter(t=>t.type==='expense'&&t.date.startsWith(ms)).reduce((s,t)=>s+t.amount,0));
  document.getElementById('hDate').textContent=now.getDate()+' de '+MON[now.getMonth()]+' '+now.getFullYear();
}

/* ── RENDER LIST ────────────────────────────────────────────────────────── */
function render(){
  const el=document.getElementById('txList');
  let list=[...txs].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  if(curFilt!=='all') list=list.filter(t=>t.type===curFilt);
  if(!list.length){
    el.innerHTML='<div class="empty"><em>📊</em>Sin movimientos aún</div>'; return;
  }
  const g={};
  list.forEach(t=>{(g[t.date]=g[t.date]||[]).push(t);});
  let h='';
  Object.keys(g).sort((a,b)=>b.localeCompare(a)).forEach(d=>{
    const db=g[d].reduce((s,t)=>t.type==='income'?s+t.amount:s-t.amount,0);
    h+=`<div class="day-hdr"><span>${fmtD(d)}</span><span style="color:${db>=0?'var(--green)':'var(--red)'}">${db>=0?'+':''}${€(Math.abs(db))}</span></div>`;
    g[d].forEach(t=>{
      const c=catOf(t.type,t.category);
      h+=`<div class="tx" onclick="openDet(${t.id})">
        <div class="tx-ico ${t.type==='income'?'i':'e'}">${c.e}</div>
        <div class="tx-info"><div class="tx-name">${t.description}</div><div class="tx-sub">${c.n.replace('\n',' ')}</div></div>
        <div class="tx-amt ${t.type==='income'?'i':'e'}">${t.type==='income'?'+':'-'}${€(t.amount)}</div>
      </div>`;
    });
  });
  el.innerHTML=h;
}

function filt(f){
  curFilt=f;
  ['all','income','expense'].forEach(x=>document.getElementById('fc-'+x).classList.toggle('on',x===f));
  render();
}

/* ── ADD SHEET ──────────────────────────────────────────────────────────── */
function open_(type){
  curType=type; selCat=null;
  document.getElementById('iAmt').value='';
  document.getElementById('iNote').value='';
  document.getElementById('iDate').value=today();

  const isI=type==='income';
  document.getElementById('catLbl').textContent = isI ? 'INGRESO — ELIGE CATEGORÍA' : 'GASTO — ELIGE CATEGORÍA';
  document.getElementById('saveBtn').className = 'save '+(isI?'i':'e');
  document.getElementById('saveBtn').textContent = isI ? 'Guardar ingreso' : 'Guardar gasto';

  const cats=isI?CI:CE;
  document.getElementById('catGrid').innerHTML=cats.map(c=>`
    <div class="cat" id="c-${c.v}" onclick="pickCat('${c.v}')">
      <em>${c.e}</em>
      <span>${c.n}</span>
      ${c.preset!=null?`<b>€${c.preset}</b>`:''}
    </div>`).join('');

  document.getElementById('addDim').classList.add('on');
  setTimeout(()=>document.getElementById('iAmt').focus(),300);
}

function pickCat(v){
  selCat=v;
  document.querySelectorAll('.cat').forEach(el=>el.classList.remove('on'));
  document.getElementById('c-'+v).classList.add('on');
  const c=catOf(curType,v);
  // auto-fill preset amount
  if(c.preset!=null){
    document.getElementById('iAmt').value=c.preset;
  }
  // auto-fill note with category name if empty
  const note=document.getElementById('iNote');
  if(!note.value.trim()) note.value=c.n.replace('\n',' ');
}

function doSave(){
  const raw=document.getElementById('iAmt').value.replace(',','.');
  const amount=parseFloat(raw);
  if(!amount||amount<=0){
    document.getElementById('iAmt').style.color='var(--red)';
    setTimeout(()=>document.getElementById('iAmt').style.color='',1200);
    return;
  }
  const cat=selCat||(curType==='income'?'oi':'oe');
  const c=catOf(curType,cat);
  const desc=document.getElementById('iNote').value.trim()||c.n.replace('\n',' ');
  const date=document.getElementById('iDate').value||today();
  txs.push({id:Date.now(),type:curType,amount,description:desc,category:cat,date});
  persist(); stats(); render();
  document.getElementById('addDim').classList.remove('on');
}

/* ── DETAIL SHEET ───────────────────────────────────────────────────────── */
function openDet(id){
  const t=txs.find(x=>x.id===id); if(!t) return;
  detId=id;
  const c=catOf(t.type,t.category), isI=t.type==='income';
  document.getElementById('dIco').className='det-ico '+(isI?'i':'e');
  document.getElementById('dIco').textContent=c.e;
  document.getElementById('dAmt').className='det-amt '+(isI?'i':'e');
  document.getElementById('dAmt').textContent=(isI?'+':'-')+€(t.amount);
  document.getElementById('dDesc').textContent=t.description;
  document.getElementById('dCat').textContent=c.e+' '+c.n.replace('\n',' ');
  document.getElementById('dDate').textContent=fmtD(t.date);
  document.getElementById('dType').textContent=isI?'↑ Ingreso':'↓ Gasto';
  document.getElementById('dType').style.color=isI?'var(--green)':'var(--red)';
  document.getElementById('detDim').classList.add('on');
}

function doDelete(){
  if(!detId||!confirm('¿Eliminar?')) return;
  txs=txs.filter(t=>t.id!==detId);
  persist(); stats(); render();
  document.getElementById('detDim').classList.remove('on');
  detId=null;
}

function dimClose(e,id){ if(e.target.id===id) document.getElementById(id).classList.remove('on'); }

/* ── INIT ───────────────────────────────────────────────────────────────── */
stats(); render();
</script>
</body>
